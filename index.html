<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Programa Situação do Aluno</title>
  </head>

  <body>
    <h1>Programa Situação do Aluno</h1>

    <p>
      Nome do Aluno:
      <input type="text" id="inNome" />
    </p>

    <p>
      1ª Nota:
      <input type="number" id="inNota1" step="0.1" />
    </p>

    <p>
      2ª Nota:
      <input type="number" id="inNota2" step="0.1" />
    </p>

    <p>
      3ª Nota:
      <input type="number" id="inNota3" step="0.1" />
    </p>

    <p>
      4ª Nota:
      <input type="number" id="inNota4" step="0.1" />
    </p>

    <p>
      <input type="button" value="Exibir Média e Situação" id="btResultado" />
    </p>

    <h3 id="outMedia"></h3>
    <h3 id="outSituacao"></h3>

    <script src="js/ex3_1.js"></script>
  </body>
</html>
